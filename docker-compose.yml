services:
  db:
    image: mariadb:11
    container_name: learnova-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: learnova_db
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: learnova-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: learnova-rag-service
    restart: unless-stopped
    environment:
      APP_NAME: Learnova RAG Service
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: learnova_lesson_chunks
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}
      WHISPER_MODEL_NAME: ${WHISPER_MODEL_NAME}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      FFMPEG_BIN: ffmpeg
      TEMP_DIR: /tmp
      REQUEST_TIMEOUT_SECONDS: 120
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnova-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}
      RAG_TRIGGER_TIMEOUT_MS: ${RAG_TRIGGER_TIMEOUT_MS}
    depends_on:
      db:
        condition: service_healthy
      rag-service:
        condition: service_healthy

volumes:
  mariadb_data:
  qdrant_data:
