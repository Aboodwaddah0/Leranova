services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: learnova-api
    container_name: learnova-api
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: mysql://root:root@db:3306/learnova
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-learnova_super_secret_key_2026_backend_api}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-http://localhost:5173/reset-password}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_TLS_REJECT_UNAUTHORIZED: ${EMAIL_TLS_REJECT_UNAUTHORIZED:-true}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-Learnova <no-reply@learnova.local>}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      RAG_SERVICE_URL: http://rag-service:8000
      RAG_TRIGGER_TIMEOUT_MS: ${RAG_TRIGGER_TIMEOUT_MS:-10000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    image: learnova-rag-service
    container_name: learnova-rag-service
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Learnova RAG Service
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: learnova_lesson_chunks
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en}
      WHISPER_MODEL_NAME: ${WHISPER_MODEL_NAME:-small}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      FFMPEG_BIN: ffmpeg
      TEMP_DIR: /tmp
      REQUEST_TIMEOUT_SECONDS: 120
    depends_on:
      - qdrant

  db:
    image: mariadb:10.6
    container_name: learnova-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: learnova
      MYSQL_USER: learnova
      MYSQL_PASSWORD: learnova123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: learnova-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  qdrant:
    image: qdrant/qdrant
    container_name: learnova-qdrant
    ports:
      - "6333:6333"
    volumes:
    - leranova_qdrant_data:/qdrant/storage

volumes:
  db_data:
  leranova_qdrant_data: